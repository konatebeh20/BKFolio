<div class="container py-5">
    <!-- <h1 class="mb-4">📝 Mes Articles</h1> -->
    <h1 class="mb-4">Mes Articles</h1>

    <div class="row">
        <div class="col-md-6 col-lg-4 mb-4" *ngFor="let article of articles">

            <div class="card h-100 shadow-sm">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">{{ article.title }}</h5>
                    <h6 class="card-subtitle mb-2 text-muted">{{ article.date }}</h6>
                    <p class="card-text flex-grow-1">
                        <!-- Résumé factice, tu peux ajouter une propriété `summary` plus tard -->
                        Lire l'article pour plus de détails.
                    </p>
                    <!-- <a 
            [routerLink]="['/articles', article.id]" 
            class="btn btn-primary mt-auto">
            Lire l'article
          </a> -->
                    <a [routerLink]="[article.id]" class="btn btn-primary mt-auto">
                        Lire l'article
                    </a>

                </div>
            </div>

        </div>
    </div>
</div>
