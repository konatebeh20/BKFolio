<div class="container py-5" *ngIf="article">
  <h1>{{ article.title }}</h1>
  <h6 class="text-muted">{{ article.date }}</h6>

  <div *ngFor="let paragraph of article.content" class="mb-3">
    <p>{{ paragraph }}</p>
  </div>

  <a [href]="article.pdf" target="_blank" class="btn btn-primary">
    Télécharger l'article (PDF)
  </a>
</div>

<div *ngIf="!article">
  <p>Article introuvable.</p>
</div>
